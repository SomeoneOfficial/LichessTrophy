name: Sync Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/People.json'
      - 'supabase/Teams.json'
      - 'scripts/sync-supabase.mjs'
      - '.github/workflows/sync-supabase.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync JSON to Supabase
        run: node scripts/sync-supabase.mjs
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
